<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Youtube, YouTube Play, Brasil Tube, vídeos online, streaming, assistir vídeos, entretenimento digital, Welton Abravanel">
    <meta name="description" content="Assista aos melhores vídeos, músicas e conteúdos exclusivos no YouTube Play."> 
    <title>Youtube Play | Muitos Vídeos Pra Você</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f; 
            color: white;
        }
        
        #tela-carregamento {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(180deg, #0f0f0f 0%, #1a1a1a 100%);
        }

        .mensagem {
            background: rgba(33, 33, 33, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            border: 1px solid #333;
            backdrop-filter: blur(10px); /* Efeito Glassmorphism que você prefere */
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #frame-camuflado {
            border: none;
            width: 100%;
            height: 100%;
            display: none; 
        }
    </style>
</head>
<body>

    <div id="tela-carregamento">
        <div class="mensagem">
            <h1>Carregando conteúdo...</h1>
            <div class="loader"></div>
            <p>Prepare a pipoca, estamos preparando tudo para você.</p>
        </div>
    </div>

    <iframe id="frame-camuflado" src="" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>

    <script>
       /**
         * Lógica de Programação Horária para o YouTube Play
         */
        function obterDestinoPorHorario() {
            const agora = new Date();
            const hora = agora.getHours();
            const cloneVitara = "https://youtube-clone-platform.vitara.app";
            const youtubeOficial = "https://www.youtube.com.br";

            // PROGRAMAÇÃO DE HORÁRIOS:
            
            // Manhã (06h às 12h): Exibe SEMPRE o site camuflado (Vitara)
            if (hora >= 6 && hora < 12) {
                return cloneVitara;
            }
            
            // Tarde (12h às 18h): Exibe o YouTube Oficial
            if (hora >= 12 && hora < 18) {
                return youtubeOficial;
            }

            // Noite / Horário de Pico (18h às 00h): Exibe o YouTube Oficial
            if (hora >= 18 && hora < 24) {
                return youtubeOficial;
            }

            // Madrugada (00h às 06h): Exibe o YouTube oficial
            return youtubeOficial;
        }

        const urlFinal = obterDestinoPorHorario();
        const tempoDeSplash = 3000; // 3 segundos de charme na tela de load

        setTimeout(() => {
            // Se for YouTube oficial, redirecionamos para evitar erro de Iframe (X-Frame)
            if (urlFinal.includes("youtube.com")) {
                window.location.href = urlFinal;
            } else {
                // Para o seu clone, mantemos o iframe "camuflado"
                document.getElementById('tela-carregamento').style.display = 'none';
                const iframe = document.getElementById('frame-camuflado');
                iframe.style.display = 'block';
                iframe.src = urlFinal;
            }
        }, tempoDeSplash);
    </script>

</body>
</html>
