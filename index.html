<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="keywords" content="Youtube, YouTube Play, Brasil Tube, vídeos online, streaming, assistir vídeos, entretenimento digital, Welton Abravanel">
    <meta name="language" content="Portuguese">
    <meta name="robots" content="index, follow">
    <meta name="revisit-after" content="1 day">
    <meta name="description" content="Assista aos melhores vídeos, músicas e conteúdos exclusivos no YouTube Play. A plataforma de streaming feita para você aproveitar o melhor da web."> 
    <meta property="og:title" content="Youtube , Youtube Play">
    <meta property="og:description" content="Muitos vídeos para você aproveitar.">
    <meta property="og:image" content="https://miro.medium.com/v2/resize:fit:1400/1*qmj2NWAOJo1dsTQ5riciOA.jpeg">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://miro.medium.com/v2/resize:fit:1400/1*qmj2NWAOJo1dsTQ5riciOA.jpeg">
    <title>Youtube Play , Muitos Videos Pra Você</title>
    <style>
        /* Removemos as margens para o iframe ocupar 100% do espaço */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barra de rolagem dupla */
            font-family: sans-serif;
            background-color: #f4f4f4;
        }
        
        #tela-carregamento {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .mensagem {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Configuração do Iframe (inicialmente oculto) */
        #frame-camuflado {
            border: none;
            width: 100%;
            height: 100%;
            display: none; 
        }
    </style>
</head>
<body>

    <div id="tela-carregamento">
        <div class="mensagem">
            <h1>Aguarde um momento...</h1>
            <p>Carregando um de nossos sites.</p>
        </div>
    </div>

    <iframe id="frame-camuflado" src=""></iframe>

    <script>
        // Array com as URLs
        const destinos = [
            "https://youtube.com.br",
            
            // <-- YouTube Music adicionado aqui
        ];

        const indiceAleatorio = Math.floor(Math.random() * destinos.length);
        const urlEscolhida = destinos[indiceAleatorio];
        const tempoEspera = 3000; // 3 segundos

        setTimeout(() => {
            // Verifica se a URL escolhida é o YouTube ou o YouTube Music
            if (urlEscolhida === "https://youtube.com.br") {
                // Redireciona a página inteira ao invés de usar o iframe
                window.location.href = urlEscolhida;
            } else {
                // 1. Esconde a tela de carregamento
                document.getElementById('tela-carregamento').style.display = 'none';
                
                // 2. Mostra o iframe
                const iframe = document.getElementById('frame-camuflado');
                iframe.style.display = 'block';
                
                // 3. Carrega a URL dentro do iframe
                iframe.src = urlEscolhida;
            }
        }, tempoEspera);
    </script>

</body>
</html>
