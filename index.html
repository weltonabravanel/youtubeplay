<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando...</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        // O novo domínio base
        const baseTarget = "https://youtube-clone-platform.vitara.app";

        // Captura tudo o que vem após o seu domínio atual (ex: /watch?v=123)
        const currentPath = window.location.pathname;
        const currentSearch = window.location.search;
        const currentHash = window.location.hash;

        // Monta a URL final preservando o restante do link
        const finalUrl = baseTarget + currentPath + currentSearch + currentHash;

        // Executa o redirecionamento
        window.location.replace(finalUrl);
    </script>
</body>
</html>
