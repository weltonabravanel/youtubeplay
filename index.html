<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe id="proxyFrame" src="" allowfullscreen></iframe>

    <script>
        // URL base do seu site real
        const targetBaseUrl = "https://youtube-clone-platform.vitara.app/";

        // Captura tudo o que vier após o "?" ou "/" na URL atual
        const currentQuery = window.location.search; 
        const currentPath = window.location.pathname.split('/').pop();

        // Monta o endereço final mantendo os parâmetros (ex: ?v=123)
        const finalUrl = targetBaseUrl + currentQuery;

        // Atribui ao iframe
        document.getElementById('proxyFrame').src = finalUrl;
    </script>
</body>
</html>
